<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Nhập dữ liệu với prompt() và hiển thị với alert()</title>
		<meta charest="utf-8">
		
	</head>
	<body>
		
		<script>
			let name= prompt("Hãy nhập tên của bạn");
			let yob = Number(prompt("Hãy nhập năm sinh của bạn"));
			
			window.alert("Xin chào " + name + "năm 2026 bạn đã " + (2026-yob) + " tuổi rồi đó.");
		</script>
	</body>
</html>
