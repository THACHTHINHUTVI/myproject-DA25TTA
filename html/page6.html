<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Tính diện tích hình chữ nhật</title>
		<meta charest="utf-8">
		
	</head>
	<body>
		
		<script>
			let d =Number(prompt("Hãy nhập chiều dài hình chữ nhật: "));
			
			let r =Number(prompt("Hãy nhập chiều rộng hình chữ nhật: "));
			if(d<r)
				alert("Chiều dài phải nhỏ hơn chiều rộng");
			else if(d==r)
				alert("TRƯỜNG HỢP ĐỰC BIỆT :DIỆN TÍCH HÌNH VUÔNG LÀ: "+d*r);
			else 
				alert("DIỆN TÍCH HÌNH CHỬ NHẬT LÀ: " +d*r);
		</script>
	</body>
</html>
